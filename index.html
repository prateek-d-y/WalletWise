<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WalletWise - Expense Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./css/style.css">

</head>
<body class="dark-mode">

    <!-- Top Navigation -->
    <header class="top-nav">
        <div class="logo">
            <i class="fa-solid fa-wallet"></i>
            <span>WalletWise</span>
        </div>
        <nav class="desktop-nav">
            <button class="nav-item active" data-target="records-view">
                <i class="fa-solid fa-list-ul"></i> Records
            </button>
            <button class="nav-item" data-target="analysis-view">
                <i class="fa-solid fa-chart-pie"></i> Analysis
            </button>
            <button class="nav-item" data-target="accounts-view">
                <i class="fa-solid fa-building-columns"></i> Accounts
            </button>
        </nav>
        <button id="theme-toggle" class="icon-btn">
            <i class="fa-solid fa-sun"></i>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="app-content">

        <!-- 1. Records Section -->
        <section id="records-view" class="view active">

            <div class="summary-cards">
                <div class="card balance-card">
                    <h3>Total Balance</h3>
                    <h2 id="total-balance">₹0</h2>
                </div>
                <div class="card-row">
                    <div class="card income-card">
                        <div class="card-icon"><i class="fa-solid fa-arrow-down"></i></div>
                        <div class="card-info">
                            <p>Income</p>
                            <h3 id="total-income">₹0</h3>
                        </div>
                    </div>
                    <div class="card expense-card">
                        <div class="card-icon"><i class="fa-solid fa-arrow-up"></i></div>
                        <div class="card-info">
                            <p>Expense</p>
                            <h3 id="total-expense">₹0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- List Header -->
            <div class="section-header">
                <h3>Transactions</h3>
                <div class="date-nav hidden" id="date-nav" style="display: none; align-items: center; gap: 0.5rem; background: var(--input-bg); padding: 0.2rem 0.5rem; border-radius: 0.5rem; border: 1px solid var(--border-color);">
                    <button id="prev-date" class="icon-btn" style="font-size: 0.8rem; padding: 0.2rem;"><i class="fa-solid fa-chevron-left"></i></button>
                    <span id="date-label" style="font-size: 0.85rem; font-weight: 500; min-width: 70px; text-align: center; color: var(--text-main);"></span>
                    <button id="next-date" class="icon-btn" style="font-size: 0.8rem; padding: 0.2rem;"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <select id="time-filter" class="filter-select">
                    <option value="all">All Time</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                </select>
            </div>

            <!-- Transaction List -->
            <div class="transaction-list" id="transaction-list">
                <!-- like js code updation  comes here -->
            </div>

            <!-- Floating Action Button for Records -->
            <button class="fab" onclick="openModal('transaction-modal')">
                <i class="fa-solid fa-plus"></i>
            </button>
        </section>

        <!-- 2. Analysis Section -->
        <section id="analysis-view" class="view hidden">
            <div class="section-header">
                <h3>Analytics</h3>
            </div>
            
            <div class="card">
                <h4 style="margin-bottom: 1rem;">Expense Breakdown</h4>
                <div class="chart-wrapper">
                    <canvas id="expense-pie-chart"></canvas>
                </div>
            </div>

            <div class="card">
                <h4 style="margin-bottom: 1rem;">Spending Trends</h4>
                <div class="chart-wrapper">
                    <canvas id="expense-line-chart"></canvas>
                </div>
            </div>

            <div class="category-breakdown card" id="category-breakdown">
                <h4>Category Details</h4>
                <div id="category-list">
                    <!-- Categories will b injected by JS -->
                </div>
            </div>
        </section>

        <!-- 3. Accounts Section -->
        <section id="accounts-view" class="view hidden">
            <div class="section-header">
                <h3>My Accounts</h3>
            </div>
            
            <div class="card balance-card accounts-total-card">
                <h3>Net Worth</h3>
                <h2 id="net-worth">₹0</h2>
            </div>

            <div class="accounts-list" id="accounts-list">
                <!-- initially add accounts. Accounts will be injected by JS -->
            </div>

            <button class="btn-primary block-btn" onclick="openModal('account-modal')">
                <i class="fa-solid fa-plus"></i> Add New Account
            </button>
        </section>

    </main>

    <!-- Bottom navigation for responsive-->
    <nav class="bottom-nav">
        <button class="nav-item active" data-target="records-view">
            <i class="fa-solid fa-list-ul"></i>
            <span>Records</span>
        </button>
        <button class="nav-item" data-target="analysis-view">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Analysis</span>
        </button>
        <button class="nav-item" data-target="accounts-view">
            <i class="fa-solid fa-building-columns"></i>
            <span>Accounts</span>
        </button>
    </nav>

    <!-- MODALS -->

    <!-- Add Transaction Modal -->
    <div id="transaction-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Transaction</h3>
                <button class="close-btn" onclick="closeModal('transaction-modal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="transaction-form">
                <div class="form-group type-toggle">
                    <input type="radio" id="type-expense" name="type" value="expense" checked>
                    <label for="type-expense" class="toggle-btn expense-toggle">Expense</label>
                    <input type="radio" id="type-income" name="type" value="income">
                    <label for="type-income" class="toggle-btn income-toggle">Income</label>
                </div>

                <div class="form-group">
                    <label for="trans-amount">Amount (₹)</label>
                    <input type="number" id="trans-amount" required min="1" placeholder="0">
                </div>

                <div class="form-group">
                    <label for="trans-account">Account</label>
                    <select id="trans-account" required></select>
                </div>

                <div class="form-group">
                    <label for="trans-category">Category</label>
                    <select id="trans-category" required>
                        <option value="Food">Food 🍔</option>
                        <option value="Transport">Transport 🚗</option>
                        <option value="Education">Education 📚</option>
                        <option value="Health">Health ❤️</option>
                        <option value="Social">Social 🎉</option>
                        <option value="Shopping">Shopping 🛍️</option>
                        <option value="Rent">Rent 🏠</option>
                        <option value="Salary">Salary 💰</option>
                        <option value="Others">Others ✨</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="trans-datetime">Date & Time</label>
                    <input type="datetime-local" id="trans-datetime" required>
                </div>

                <div class="form-group">
                    <label for="trans-notes">Notes (Optional)</label>
                    <input type="text" id="trans-notes" placeholder="e.g. Lunch at KFC">
                </div>

                <button type="submit" class="btn-primary">Save Transaction</button>
            </form>
        </div>
    </div>

    <!-- Add Account Modal -->
    <div id="account-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Account</h3>
                <button class="close-btn" onclick="closeModal('account-modal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="account-form">
                <div class="form-group">
                    <label for="acc-name">Account Name</label>
                    <input type="text" id="acc-name" required placeholder="e.g. SBI, Cash, Paytm">
                </div>
                <div class="form-group">
                    <label for="acc-balance">Initial Balance (₹)</label>
                    <input type="number" id="acc-balance" required placeholder="0">
                </div>
                <button type="submit" class="btn-primary">Save Account</button>
            </form>
        </div>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
